global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s
scrape_configs:
  - job_name: 'prometheuas'
    static_configs:
    - targets: ['localhost:9090']
      labels:
        service: prometheus

  - job_name: pushgateway
    honor_labels: true
    static_configs:
    - targets: ['pushgateway:9091']
      labels:
        service: pushgateway
    scrape_interval: 15s
    metrics_path: /metrics
    scheme: http
